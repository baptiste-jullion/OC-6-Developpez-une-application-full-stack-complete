<div class="grid relative min-h-[calc(100vh-100px)] place-items-center p-6">
  <a
    class="absolute! left-4 top-4"
    mat-icon-button
    routerLink="/"
    aria-label="Retour"
  >
    <mat-icon>keyboard_backspace</mat-icon>
  </a>

  <form
    class="grid w-full max-w-105 gap-3"
    [formGroup]="form"
    (ngSubmit)="submit()"
  >
    <img
      class="mx-auto block h-30 w-auto md:hidden"
      src="/logo_mdd.png"
      alt="MDD"
    />

    <h1 class="text-center">Inscription</h1>

    <mat-form-field appearance="outline">
      <mat-label>Nom d'utilisateur</mat-label>
      <input matInput formControlName="username" autocomplete="username" />
    </mat-form-field>

    <mat-form-field appearance="outline">
      <mat-label>Adresse e-mail</mat-label>
      <input
        matInput
        type="email"
        formControlName="email"
        autocomplete="email"
      />
    </mat-form-field>

    <mat-form-field appearance="outline">
      <mat-label>Mot de passe</mat-label>
      <input
        matInput
        type="password"
        formControlName="password"
        autocomplete="new-password"
      />
    </mat-form-field>

    <button
      mat-raised-button
      class="mdd-raised"
      type="submit"
      [disabled]="isSubmitting()"
    >
      S'inscrire
    </button>

    @if (error()) {
      <p class="m-0 text-(--mat-sys-error)">{{ error() }}</p>
    }
  </form>
</div>
