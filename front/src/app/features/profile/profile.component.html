<div class="grid gap-6">
  <form
    class="grid w-full mx-auto max-w-130 gap-3"
    [formGroup]="form"
    (ngSubmit)="updateProfile()"
  >
    <h1>Profil utilisateur</h1>

    <mat-form-field appearance="outline">
      <mat-label>Nom d'utilisateur</mat-label>
      <input matInput formControlName="username" />
    </mat-form-field>

    <mat-form-field appearance="outline">
      <mat-label>Email</mat-label>
      <input matInput type="email" formControlName="email" />
    </mat-form-field>

    <mat-form-field appearance="outline">
      <mat-label>Mot de passe</mat-label>
      <input
        matInput
        type="password"
        formControlName="password"
        autocomplete="new-password"
      />
    </mat-form-field>

    <button
      mat-raised-button
      class="mdd-raised"
      type="submit"
      [disabled]="isSubmitting()"
    >
      Mettre à jour
    </button>
  </form>

  <hr class="w-full" />

  <section class="grid gap-3">
    <h2 class="text-center">Abonnements</h2>

    @if (subscribedTopics().length) {
      <div class="grid grid-cols-[repeat(auto-fit,minmax(260px,1fr))] gap-4">
        @for (topic of subscribedTopics(); track topic.id) {
          <mat-card class="card">
            <mat-card-header>
              <mat-card-title>{{ topic.title }}</mat-card-title>
            </mat-card-header>
            <mat-card-content>
              <p class="m-0">{{ topic.description }}</p>
            </mat-card-content>
            <mat-card-actions align="end">
              <button
                mat-raised-button
                type="button"
                (click)="unsubscribe(topic.id)"
              >
                Se désabonner
              </button>
            </mat-card-actions>
          </mat-card>
        }
      </div>
    } @else {
      <p class="m-0 opacity-80">Aucun abonnement.</p>
    }
  </section>
</div>
