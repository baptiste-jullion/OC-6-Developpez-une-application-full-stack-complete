@if (isAuthRoute()) {
  <div class="mx-auto w-full max-w-5xl p-4 md:hidden">
    <router-outlet />
  </div>

  <div class="hidden md:block">
    <mat-sidenav-container class="h-screen">
      <mat-sidenav
        #drawer
        mode="over"
        position="end"
        [disableClose]="false"
        class="h-full"
      >
        @if (auth.isAuthenticated()) {
          <div class="flex min-h-full flex-col p-4">
            <mat-nav-list>
              <a mat-list-item routerLink="/posts" (click)="drawer.close()"
                >Articles</a
              >
              <a mat-list-item routerLink="/topics" (click)="drawer.close()"
                >Thèmes</a
              >
            </mat-nav-list>

            <div class="mt-auto pt-4 flex items-center justify-between">
              <button
                mat-button
                color="warn"
                type="button"
                (click)="disconnect(); drawer.close()"
              >
                Se déconnecter
              </button>

              <button
                mat-icon-button
                type="button"
                aria-label="Profil"
                routerLink="/profile"
                (click)="drawer.close()"
              >
                <mat-icon>account_circle</mat-icon>
              </button>
            </div>
          </div>
        }
      </mat-sidenav>

      <mat-sidenav-content>
        <mat-toolbar class="mdd-toolbar">
          <div class="mx-auto flex w-full max-w-5xl items-center gap-3">
            <a
              class="inline-flex items-center text-current no-underline"
              [routerLink]="auth.isAuthenticated() ? ['/posts'] : ['/']"
              aria-label="MDD"
            >
              <img class="block h-17.5 w-auto" src="/logo_mdd.png" alt="MDD" />
            </a>

            <span class="flex-1"></span>

            @if (auth.isAuthenticated()) {
              <div class="hidden md:flex items-center">
                <a mat-button routerLink="/posts" routerLinkActive="underline"
                  >Articles</a
                >
                <a mat-button routerLink="/topics" routerLinkActive="underline"
                  >Thèmes</a
                >
              </div>

              <button
                mat-button
                color="warn"
                type="button"
                class="hidden md:inline-flex"
                (click)="disconnect()"
              >
                Se déconnecter
              </button>

              <div class="hidden md:block">
                <a mat-icon-button routerLink="/profile" aria-label="Profil">
                  <mat-icon>account_circle</mat-icon>
                </a>
              </div>

              <div class="md:hidden">
                <button
                  mat-icon-button
                  type="button"
                  aria-label="Menu"
                  (click)="drawer.toggle()"
                >
                  <mat-icon>menu</mat-icon>
                </button>
              </div>
            }
          </div>
        </mat-toolbar>

        <div class="mx-auto w-full max-w-5xl p-4">
          <router-outlet />
        </div>
      </mat-sidenav-content>
    </mat-sidenav-container>
  </div>
} @else {
  <mat-sidenav-container class="h-screen">
    <mat-sidenav
      #drawer
      mode="over"
      position="end"
      [disableClose]="false"
      class="h-full"
    >
      @if (auth.isAuthenticated()) {
        <div class="flex min-h-full flex-col p-4">
          <mat-nav-list>
            <button
              mat-button
              color="warn"
              type="button"
              (click)="disconnect(); drawer.close()"
            >
              Se déconnecter
            </button>
            <a mat-list-item routerLink="/posts" (click)="drawer.close()"
              >Articles</a
            >
            <a mat-list-item routerLink="/topics" (click)="drawer.close()"
              >Thèmes</a
            >
          </mat-nav-list>

          <div class="mt-auto pt-4 flex items-center justify-end">
            <button
              mat-icon-button
              type="button"
              aria-label="Profil"
              routerLink="/profile"
              (click)="drawer.close()"
            >
              <mat-icon>account_circle</mat-icon>
            </button>
          </div>
        </div>
      }
    </mat-sidenav>

    <mat-sidenav-content>
      <mat-toolbar class="mdd-toolbar">
        <div class="mx-auto flex w-full max-w-5xl items-center gap-3">
          <a
            class="inline-flex items-center text-current no-underline"
            [routerLink]="auth.isAuthenticated() ? ['/posts'] : ['/']"
            aria-label="MDD"
          >
            <img class="block h-17.5 w-auto" src="/logo_mdd.png" alt="MDD" />
          </a>

          <span class="flex-1"></span>

          @if (auth.isAuthenticated()) {
            <div class="hidden md:flex items-center">
              <button
                mat-button
                color="warn"
                type="button"
                (click)="disconnect()"
              >
                Se déconnecter
              </button>
              <a mat-button routerLink="/posts" routerLinkActive="underline"
                >Articles</a
              >
              <a mat-button routerLink="/topics" routerLinkActive="underline"
                >Thèmes</a
              >
            </div>

            <div class="hidden md:block">
              <a mat-icon-button routerLink="/profile" aria-label="Profil">
                <mat-icon>account_circle</mat-icon>
              </a>
            </div>
          }

          @if (auth.isAuthenticated()) {
            <div class="md:hidden">
              <button
                mat-icon-button
                type="button"
                aria-label="Menu"
                (click)="drawer.toggle()"
              >
                <mat-icon>menu</mat-icon>
              </button>
            </div>
          }
        </div>
      </mat-toolbar>

      <div class="mx-auto w-full max-w-5xl p-4">
        <router-outlet />
      </div>
    </mat-sidenav-content>
  </mat-sidenav-container>
}
